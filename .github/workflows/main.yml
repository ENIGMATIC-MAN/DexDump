name: Build DexDump Module
on: 
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile the Module
        run: ./gradlew assembleRelease

      - name: Upload the compiled ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DexDump-Magisk-Module
          path: '**/*.zip' # This hunts down the finished zip file and uploads it
          
